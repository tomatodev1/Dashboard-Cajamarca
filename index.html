<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sistema de Alerta Temprana · PROTECTA Perú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef4fa;--panel:#ffffff;--panel2:#f6fafd;--text:#132430;--sub:#59697a;--muted:#93a0ac;--border:#e3eaf2;--grid:#eaf0f6;--accent:#2b7cc0;--accent-soft:#e7f1fb;--hi:#dc2626;--med:#d97706;--med-alto:#c2410c;--lo:#16a34a;--hi-soft:#fdecec;--med-soft:#fdf3e6;--med-alto-soft:#fce4d6;--lo-soft:#e9f7ef;--shadow:0 1px 2px rgba(20,45,75,.05),0 6px 22px rgba(20,45,75,.055);}
[data-theme="dark"]{--bg:#0d141b;--panel:#151f29;--panel2:#111a23;--text:#e8eef4;--sub:#9fb0bf;--muted:#647380;--border:#243342;--grid:#1d2833;--accent:#4aa3e0;--accent-soft:#132738;--hi:#f0554d;--med:#e2942f;--med-alto:#f2872f;--lo:#38b06e;--hi-soft:#2a1615;--med-soft:#241a10;--med-alto-soft:#2a1a10;--lo-soft:#122318;--shadow:0 1px 2px rgba(0,0,0,.35),0 10px 26px rgba(0,0,0,.35);}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-family:Manrope,system-ui,sans-serif}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button,select{font-family:inherit}
button{outline:none}
::selection{background:var(--accent-soft)}
@keyframes pulseRing{0%{transform:scale(1);opacity:.55}70%{transform:scale(2.6);opacity:0}100%{opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  "use strict";

  var ALL_ZONAS = ["UGT1","UGT2"];
  var ZONA_COLORS = {UGT1:'#2b7cc0',UGT2:'#d64545'};
  // Posiciones aproximadas (% sobre images/mapa.png) de los distritos que
  // cubre cada UGT, segun confirmo el equipo. El primer distrito de cada
  // lista es la referencia principal (capital de provincia) y lleva el pin
  // animado; el resto son puntos secundarios mas chicos sobre el mismo mapa.
  var ZONA_DISTRITOS = {
    UGT1: [
      {nombre:'Cajamarca', x:40.4, y:76.3},
      {nombre:'Baños del Inca', x:42.3, y:74.5},
      {nombre:'La Encañada', x:53.6, y:65.3}
    ],
    UGT2: [
      {nombre:'Celendín', x:69.5, y:38.5},
      {nombre:'Bambamarca', x:39.7, y:15.7},
      {nombre:'Hualgayoc', x:32.8, y:26.0},
      {nombre:'Sorochuco', x:60.7, y:44.0},
      {nombre:'Huasmín', x:61.5, y:35.0}
    ]
  };

  var SOURCES = [
    {name:'Defensoría del Pueblo',desc:'Escalamiento de conflictos sociales reportados'},
    {name:'OEFA',desc:'Denuncias ambientales por zona'},
    {name:'INEI',desc:'Indicadores socioeconómicos y de pobreza'},
    {name:'Monitoreo de medios',desc:'Volumen y tono de noticias locales/regionales'},
    {name:'Calendario cívico-electoral',desc:'Fechas críticas, festividades y proceso electoral 2026'}
  ];

  /* ---------- helpers ---------- */
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function smoothPath(coords){
    // Curva Catmull-Rom -> Bezier cubica (tension 1/6). Cada punto real sigue
    // siendo un ancla exacta del path (mismo valor, misma posicion) -- esto
    // solo cambia como se conectan visualmente los puntos (curvo en vez de
    // segmentos rectos), no suaviza ni altera ningun dato.
    if(coords.length<2) return '';
    if(coords.length===2) return 'M'+coords[0][0]+' '+coords[0][1]+' L'+coords[1][0]+' '+coords[1][1];
    var d='M'+coords[0][0]+' '+coords[0][1]+' ';
    for(var i=0;i<coords.length-1;i++){
      var p0=coords[i-1]||coords[i];
      var p1=coords[i];
      var p2=coords[i+1];
      var p3=coords[i+2]||p2;
      var c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
      d+='C'+c1x+' '+c1y+','+c2x+' '+c2y+','+p2[0]+' '+p2[1]+' ';
    }
    return d;
  }
  function fmtPct(v){return v==null?'—':Math.round(v*100)+'%';}
  function fmtPct1(v){return v==null?'—':(Math.round(v*1000)/10)+'%';}
  function levelColor(l){
    if(l==='ALTO') return 'var(--hi)';
    if(l==='MEDIO ALTO') return 'var(--med-alto)';
    if(l==='MEDIO') return 'var(--med)';
    if(l==='BAJO') return 'var(--lo)';
    return 'var(--muted)';
  }
  function levelSoft(l){
    if(l==='ALTO') return 'var(--hi-soft)';
    if(l==='MEDIO ALTO') return 'var(--med-alto-soft)';
    if(l==='MEDIO') return 'var(--med-soft)';
    if(l==='BAJO') return 'var(--lo-soft)';
    return 'var(--panel2)';
  }
  function zonaColor(id){ return ZONA_COLORS[id] || 'var(--muted)'; }
  function zonaLabel(z){ return (z && z.nombre) ? z.nombre : (z ? z.zona_id : ''); }
  function explicacionNivel(z){
    var factores=[];
    if(z.racha_semanas_protesta!=null && z.racha_semanas_protesta>0){
      factores.push('una racha activa de protestas ('+z.racha_semanas_protesta+' semana'+(z.racha_semanas_protesta>1?'s':'')+')');
    }
    if(z.dias_desde_ultima_protesta!=null){
      if(z.dias_desde_ultima_protesta<=14) factores.push('una protesta reciente (hace '+z.dias_desde_ultima_protesta+' días)');
      else if(z.dias_desde_ultima_protesta>90) factores.push('ausencia de protestas en los últimos '+z.dias_desde_ultima_protesta+' días');
    }
    if(z.proxima_fecha_critica && z.semana){
      var horizonMs=parseYMD(z.semana)+HORIZON_DAYS*DAY_MS;
      if(parseYMD(z.proxima_fecha_critica.fecha)<=horizonMs){
        factores.push('una fecha crítica próxima ('+z.proxima_fecha_critica.evento+', '+z.proxima_fecha_critica.fecha+')');
      }
    }
    if(z.eventos_4w!=null && z.eventos_4w>=3){
      factores.push(z.eventos_4w+' eventos registrados en las últimas 4 semanas');
    }
    if(!factores.length) return null;
    return 'Este nivel se explica principalmente por '+factores.slice(0,3).join(', ')+'.';
  }
  var DAY_MS = 86400000;
  var HORIZON_DAYS = 30; // prob en serie_tiempo ya es P(protesta <= 30 dias) desde el cierre de esa semana
  function parseYMD(s){ var p=s.split('-').map(Number); return Date.UTC(p[0],p[1]-1,p[2]); }
  function fmtDateISO(ms){ var d=new Date(ms); function p2(n){return n<10?'0'+n:''+n;} return d.getUTCFullYear()+'-'+p2(d.getUTCMonth()+1)+'-'+p2(d.getUTCDate()); }
  var MES_NOMBRES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function fmtDayMonth(ms,withYear){ var d=new Date(ms); return d.getUTCDate()+' '+MES_NOMBRES[d.getUTCMonth()]+(withYear?(' '+d.getUTCFullYear()):''); }
  function keyOfMonth(ms){ var d=new Date(ms); return d.getUTCFullYear()+'-'+(d.getUTCMonth()+1<10?'0':'')+(d.getUTCMonth()+1); }
  function monthLabel(key){ var p=key.split('-'); return MES_NOMBRES[+p[1]-1]+' '+p[0]; }
  function shiftMonth(key,n){ var p=key.split('-'); var y=+p[0], m=+p[1]-1+n; while(m<0){m+=12;y--;} while(m>11){m-=12;y++;} return y+'-'+(m+1<10?'0':'')+(m+1); }
  function maxKey(a,b){ return a>b?a:b; }
  function lastDayOfMonth(key){ var p=key.split('-'); var y=+p[0], m=+p[1]-1; return Date.UTC(y,m+1,0); }
  function monthOptsRange(fromKey,toKey){ var out=[],k=fromKey,guard=0; while(k<=toKey&&guard<600){ out.push({v:k,label:monthLabel(k)}); k=shiftMonth(k,1); guard++; } return out; }

  /* ---------- state ---------- */
  var state = {
    dark:false,
    hidden:{}, hover:null, hoverForecast:false, hoverPin:null, selected:null,
    gran:'week', fromVal:null, toVal:null,
    data:null, loadError:null
  };

  /* ---------- chart geometry constants ---------- */
  var MAIN = {cw:960,ch:340,padL:42,padR:18,padT:18,padB:34};

  /* ---------- derived data helpers ---------- */
  function modeloZonas(){ return (state.data.zonas||[]).filter(function(z){return z.track==='modelo';}); }
  function serieByZona(){
    var out={};
    (state.data.serie_tiempo||[]).forEach(function(p){
      (out[p.zona_id]=out[p.zona_id]||[]).push(p);
    });
    Object.keys(out).forEach(function(k){ out[k].sort(function(a,b){return a.semana<b.semana?-1:1;}); });
    return out;
  }
  function allSemanas(){
    var set={};
    (state.data.serie_tiempo||[]).forEach(function(p){ set[p.semana]=true; });
    return Object.keys(set).sort();
  }
  function proximasFechasCriticas(){
    var list=(state.data.calendario_fechas_criticas||[]).slice();
    list.sort(function(a,b){return a.fecha<b.fecha?-1:1;});
    return list;
  }
  function criticidadColor(c){
    if(c==='muy_alta') return '#b91c1c';
    if(c==='alta') return '#d64545';
    if(c==='media_alta') return '#c98a1e';
    return 'var(--muted)';
  }
  function realBounds(){
    var zonas=modeloZonas();
    var trueByZona=serieByZona();
    var allMs=[];
    zonas.forEach(function(z){ (trueByZona[z.zona_id]||[]).forEach(function(p){ allMs.push(parseYMD(p.semana)); }); });
    if(!allMs.length) return null;
    var trueMinMs=Math.min.apply(null,allMs);
    var trueMaxMs=Math.max.apply(null,allMs);
    var lastEnds=[];
    zonas.forEach(function(z){
      var pts=(trueByZona[z.zona_id]||[]);
      if(pts.length) lastEnds.push(parseYMD(pts[pts.length-1].semana)+HORIZON_DAYS*DAY_MS);
    });
    var horizonEndMs=Math.max.apply(null, lastEnds.concat([trueMinMs+DAY_MS]));
    return {trueByZona:trueByZona, trueMinMs:trueMinMs, trueMaxMs:trueMaxMs, horizonEndMs:horizonEndMs};
  }
  function ensureDefaultRange(rb){
    if(!rb || (state.fromVal && state.toVal)) return;
    var earliestKey=keyOfMonth(rb.trueMinMs);
    var horizonKey=keyOfMonth(rb.horizonEndMs);
    if(!state.fromVal) state.fromVal=earliestKey; // mostrar todo el histórico disponible por defecto
    if(!state.toVal) state.toVal=horizonKey;
  }
  function displaySeries(gran){
    var trueByZona=serieByZona();
    if(gran!=='month') return trueByZona;
    var out={};
    Object.keys(trueByZona).forEach(function(zid){
      var groups={};
      trueByZona[zid].forEach(function(p){
        var k=keyOfMonth(parseYMD(p.semana));
        if(!groups[k]) groups[k]={sum:0,count:0};
        groups[k].sum+=p.prob; groups[k].count++;
      });
      out[zid]=Object.keys(groups).sort().map(function(k){ return {semana:k+'-15', prob:groups[k].sum/groups[k].count}; });
    });
    return out;
  }
  function mainChartDomain(){
    var rb=realBounds();
    if(!rb) return null;
    ensureDefaultRange(rb);
    var zonas=modeloZonas();
    var fromMs=parseYMD(state.fromVal+'-01');
    var toEndMs=lastDayOfMonth(state.toVal);
    var disp=displaySeries(state.gran);
    var byZona={};
    zonas.forEach(function(z){
      byZona[z.zona_id]=(disp[z.zona_id]||[]).map(function(p){return {ms:parseYMD(p.semana),prob:p.prob,probDisplay:(p.prob_suavizado!=null?p.prob_suavizado:p.prob)};}).filter(function(p){return p.ms>=fromMs&&p.ms<=toEndMs;});
    });
    var allMs=[]; zonas.forEach(function(z){ byZona[z.zona_id].forEach(function(p){allMs.push(p.ms);}); });
    return {byZona:byZona, zonas:zonas, allMs:allMs, minMs:fromMs, maxMs:toEndMs,
      trueMaxMs:Math.min(rb.trueMaxMs,toEndMs), horizonEndMs:Math.min(rb.horizonEndMs,toEndMs), rawByZona:rb.trueByZona};
  }

  /* ---------- chart builders ---------- */
  function buildMainChart(){
    var g=MAIN, padL=g.padL,padR=g.padR,padT=g.padT,padB=g.padB,cw=g.cw,ch=g.ch;
    var W=cw-padL-padR,H=ch-padT-padB;
    var dom=mainChartDomain();
    if(!dom){
      return '<div style="padding:40px 0;text-align:center;color:var(--muted);font-size:12.5px">Aún no hay puntos en la serie de tiempo. Se irán acumulando semana a semana conforme corra el modelo.</div>';
    }
    var byZona=dom.byZona, zonas=dom.zonas, minMs=dom.minMs, maxMs=dom.maxMs, trueMaxMs=dom.trueMaxMs, horizonEndMs=dom.horizonEndMs;
    function X(ms){ return padL+(maxMs===minMs?0:(ms-minMs)/(maxMs-minMs))*W; }
    function Y(v){return padT+(1-v)*H;}
    var svg='';
    [0,0.25,0.5,0.75,1].forEach(function(gv){
      var y=Y(gv);
      svg+='<line x1="'+padL+'" x2="'+(cw-padR)+'" y1="'+y+'" y2="'+y+'" style="stroke:var(--grid)" stroke-width="1"></line>';
      svg+='<text x="'+(padL-8)+'" y="'+(y+3.5)+'" text-anchor="end" style="fill:var(--muted);font-size:10.5px;font-weight:600">'+Math.round(gv*100)+'%</text>';
    });
    var showCorte = trueMaxMs>=minMs && trueMaxMs<=maxMs;
    var showForecast = showCorte && horizonEndMs>trueMaxMs;
    if(showCorte){
      var xCorte=X(trueMaxMs);
      svg+='<line x1="'+xCorte+'" x2="'+xCorte+'" y1="'+padT+'" y2="'+(padT+H)+'" style="stroke:var(--med)" stroke-width="1.4" stroke-dasharray="4 3" opacity=".8"></line>';
      svg+='<text x="'+xCorte+'" y="'+(padT-6)+'" text-anchor="'+(showForecast?'start':'middle')+'" style="fill:var(--med);font-size:9.5px;font-weight:700">'+(showForecast?'Hoy · pronóstico →':'Hoy')+'</text>';
      if(showForecast){
        svg+='<rect x="'+xCorte+'" y="'+padT+'" width="'+((cw-padR)-xCorte)+'" height="'+H+'" style="fill:var(--med);opacity:.08"></rect>';
      }
    }
    zonas.forEach(function(z){
      if(state.hidden[z.zona_id]) return;
      var pts=(byZona[z.zona_id]||[]);
      var coords=pts.map(function(p){ return [X(p.ms),Y(p.probDisplay)]; });
      if(coords.length>1){
        svg+='<path d="'+smoothPath(coords)+'" fill="none" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"></path>';
      }
      coords.forEach(function(c){
        svg+='<circle cx="'+c[0]+'" cy="'+c[1]+'" r="3.4" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="1.4"></circle>';
      });
      if(showForecast){
        var rawPts=(dom.rawByZona[z.zona_id]||[]);
        if(rawPts.length){
          var lastRaw=rawPts[rawPts.length-1];
          var lastMs=parseYMD(lastRaw.semana);
          var segEndMs=Math.min(lastMs+HORIZON_DAYS*DAY_MS, maxMs);
          if(segEndMs>lastMs){
            var x1=X(lastMs), x2e=X(segEndMs), y1=Y(lastRaw.prob_suavizado!=null?lastRaw.prob_suavizado:lastRaw.prob);
            // curva de transicion: continua suavemente el movimiento real hasta
            // aplanarse en el valor del pronostico -- mismo valor final que una
            // linea recta, solo que sin el "codo" visual al entrar en la zona
            // de pronostico. El pronostico sigue siendo un valor plano, no una
            // tendencia inventada.
            var prevCoord=coords.length>1?coords[coords.length-2]:null;
            var tangentY=prevCoord?(y1-prevCoord[1]):0;
            var c1x=x1+(x2e-x1)*0.35, c1y=y1+tangentY*0.25;
            var c2x=x1+(x2e-x1)*0.7, c2y=y1;
            svg+='<path d="M'+x1+' '+y1+' C'+c1x+' '+c1y+','+c2x+' '+c2y+','+x2e+' '+y1+'" fill="none" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="2.2" stroke-dasharray="2 4" stroke-linecap="round" opacity=".8"></path>';
            svg+='<circle cx="'+x2e+'" cy="'+y1+'" r="3.6" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="1.4" opacity=".8"></circle>';
            // marca la fecha critica sobre el tramo de pronostico si cae dentro de esta ventana
            var pf=z.proxima_fecha_critica;
            if(pf){
              var pfMs=parseYMD(pf.fecha);
              if(pfMs>=lastMs && pfMs<=segEndMs){
                var xpf=X(pfMs);
                svg+='<line x1="'+xpf+'" x2="'+xpf+'" y1="'+(y1-9)+'" y2="'+(y1+9)+'" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="1.6" opacity=".9"></line>';
                svg+='<circle cx="'+xpf+'" cy="'+y1+'" r="4.5" fill="var(--panel)" stroke="'+zonaColor(z.zona_id)+'" stroke-width="2"></circle>';
              }
            }
          }
        }
      }
    });
    var uniqMs=[]; var seenMs={};
    dom.allMs.forEach(function(ms){ if(!seenMs[ms]){seenMs[ms]=1; uniqMs.push(ms);} });
    uniqMs.sort(function(a,b){return a-b;});
    var ticks=Math.min(8,uniqMs.length);
    for(var k=0;k<ticks;k++){
      var idx=Math.round(k/(ticks-1||1)*(uniqMs.length-1));
      var ms=uniqMs[idx];
      var x=X(ms);
      svg+='<text x="'+x+'" y="'+(ch-padB+20)+'" text-anchor="middle" style="fill:var(--muted);font-size:9.5px;font-weight:600">'+fmtDateISO(ms)+'</text>';
    }
    var tooltip='';
    var hi=state.hover;
    if(hi!=null){
      var x2=X(hi);
      svg+='<line x1="'+x2+'" x2="'+x2+'" y1="'+padT+'" y2="'+(padT+H)+'" style="stroke:var(--sub)" stroke-width="1" stroke-dasharray="3 3" opacity=".6"></line>';
      var rows='';
      zonas.forEach(function(z){
        if(state.hidden[z.zona_id]) return;
        var pt=(byZona[z.zona_id]||[]).filter(function(p){return p.ms===hi;})[0];
        if(!pt) return;
        var y3=Y(pt.probDisplay);
        svg+='<circle cx="'+x2+'" cy="'+y3+'" r="4.5" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="2"></circle>';
        rows+='<div style="display:flex;align-items:center;gap:6px;justify-content:space-between">'+
          '<span style="display:flex;align-items:center;gap:6px;color:var(--sub);font-weight:600">'+
          '<span style="width:8px;height:8px;border-radius:2px;background:'+zonaColor(z.zona_id)+';display:inline-block"></span>'+esc(zonaLabel(z))+'</span>'+
          '<strong style="color:var(--text);font-variant-numeric:tabular-nums">'+fmtPct(pt.prob)+'</strong></div>';
      });
      if(rows){
        var leftPct=clamp((x2/cw)*100,2,80);
        tooltip='<div style="position:absolute;left:'+leftPct+'%;top:'+(padT+6)+'px;width:190px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.22);padding:8px 11px;pointer-events:none;font-size:11.5px;z-index:5">'+
          '<div style="font-weight:800;font-size:11px;margin-bottom:6px;color:var(--text)">Semana del '+fmtDateISO(hi)+' · probabilidad de protesta (30 días)</div>'+rows+'</div>';
      }
    } else if(state.hoverForecast && showForecast){
      var frows='';
      zonas.forEach(function(z){
        if(state.hidden[z.zona_id]) return;
        var rawPts=(dom.rawByZona[z.zona_id]||[]);
        if(!rawPts.length) return;
        var lastRaw=rawPts[rawPts.length-1];
        var lastMsZ=parseYMD(lastRaw.semana);
        var segEndMsZ=Math.min(lastMsZ+HORIZON_DAYS*DAY_MS, maxMs);
        var explic=explicacionNivel(z);
        frows+='<div style="margin-bottom:8px">'+
          '<div style="display:flex;align-items:center;gap:6px;font-weight:800;color:var(--text)">'+
            '<span style="width:8px;height:8px;border-radius:2px;background:'+zonaColor(z.zona_id)+';display:inline-block"></span>'+esc(zonaLabel(z))+
          '</div>'+
          '<div style="color:var(--muted);font-size:10.5px;margin-top:2px">Vigente hasta '+fmtDateISO(segEndMsZ)+'</div>'+
          (explic?'<div style="color:var(--sub);margin-top:3px;line-height:1.4">'+esc(explic)+'</div>':'')+
        '</div>';
      });
      if(frows){
        var xMid=(X(trueMaxMs)+(cw-padR))/2;
        var leftPctF=clamp((xMid/cw)*100,2,72);
        tooltip='<div style="position:absolute;left:'+leftPctF+'%;top:'+(padT+6)+'px;width:220px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.22);padding:9px 12px;pointer-events:none;font-size:11.5px;z-index:5">'+
          '<div style="font-weight:800;font-size:11px;margin-bottom:6px;color:var(--med)">Contexto del pronóstico</div>'+frows+
          '<div style="font-size:10px;color:var(--muted);line-height:1.4;padding-top:4px;border-top:1px solid var(--border)">No es una predicción de tendencia — el modelo mantiene este valor durante toda la ventana. Esto es contexto real que puede influir en las próximas semanas.</div>'+
        '</div>';
      }
    }
    return '<div style="position:relative;width:100%;margin-top:8px">'+
      '<svg data-chart="main" width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'" style="display:block;width:100%;height:auto;cursor:crosshair">'+svg+'</svg>'+tooltip+'</div>';
  }

  function banner(){

      '<span style="flex:none;width:19px;height:19px;border-radius:50%;background:var(--med);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px">!</span>'+
      '<span>Las probabilidades mostradas son una <strong>estimación del modelo predictivo</strong>, no una certeza. Úselas como apoyo a la decisión junto con el criterio del equipo de relacionamiento comunitario.</span>'+
    '</div>';

  function mainChartSection(){
    var zonas=modeloZonas();
    var rb=realBounds();
    ensureDefaultRange(rb);

    var forecastBadge='';
    if(rb && rb.horizonEndMs>rb.trueMaxMs){
      forecastBadge='<span style="display:inline-flex;align-items:center;background:var(--med-soft);color:var(--med);border:1px solid color-mix(in srgb,var(--med) 30%,transparent);padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:700">Pronóstico: '+fmtDayMonth(rb.trueMaxMs+DAY_MS,false)+' – '+fmtDayMonth(rb.horizonEndMs,true)+'</span>';
    }

    var monthOpts = rb ? monthOptsRange(keyOfMonth(rb.trueMinMs), keyOfMonth(rb.horizonEndMs)) : [];
    function monthSelect(role,val){
      return '<select data-role="'+role+'" style="font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text);background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer">'+
        monthOpts.map(function(m){return '<option value="'+m.v+'"'+(m.v===val?' selected':'')+'>'+m.label+'</option>';}).join('')+
      '</select>';
    }

    var granBtns =
      '<span style="cursor:not-allowed;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;color:var(--muted)" title="No hay datos diarios disponibles aún">Día</span>'+
      '<button data-action="set-gran" data-value="week" style="border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;background:'+(state.gran==='week'?'var(--accent)':'transparent')+';color:'+(state.gran==='week'?'#fff':'var(--sub)')+'">Semana</button>'+
      '<button data-action="set-gran" data-value="month" style="border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;background:'+(state.gran==='month'?'var(--accent)':'transparent')+';color:'+(state.gran==='month'?'#fff':'var(--sub)')+'">Mes</button>';

    var rangoBtns=['6m','12m','todo','pronostico'].map(function(kind){
      var labels={'6m':'6M','12m':'12M','todo':'Todo','pronostico':'Pronóstico'};
      return '<button data-action="rango" data-kind="'+kind+'" style="border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:8px;background:var(--panel2);color:var(--text)">'+labels[kind]+'</button>';
    }).join('');

    var legendBtns=zonas.map(function(z){
      var hidden=!!state.hidden[z.zona_id];
      var val = z.prob_actual!=null ? fmtPct(z.prob_actual) : '—';
      return '<button data-action="toggle-legend" data-zone="'+z.zona_id+'" style="display:flex;align-items:center;gap:8px;border:1px solid var(--border);cursor:pointer;font-family:inherit;padding:7px 12px;border-radius:999px;background:var(--panel2);color:var(--text);opacity:'+(hidden?0.4:1)+'">'+
        '<span style="width:14px;height:2.5px;border-radius:2px;background:'+zonaColor(z.zona_id)+';display:inline-block"></span>'+
        '<span style="font-size:12px;font-weight:700">'+esc(zonaLabel(z))+'</span>'+
        '<span style="font-size:12px;font-weight:800;color:'+zonaColor(z.zona_id)+'">'+val+'</span>'+
      '</button>';
    }).join('');

    return '<section style="margin-top:18px;background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:20px 22px 18px">'+
      '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
        '<span style="font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:800">Gráfico principal</span>'+
        forecastBadge+
      '</div>'+
      '<div style="font-size:16.5px;font-weight:800;letter-spacing:-.2px;margin-top:6px">Tendencia y pronóstico de riesgo por UGT</div>'+
      
      '<div style="display:flex;gap:22px;flex-wrap:wrap;align-items:flex-end;margin-top:16px">'+
        '<div><div style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px">Ver por</div>'+
          '<div style="display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:3px">'+granBtns+'</div></div>'+
        '<label style="display:flex;flex-direction:column;gap:4px;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)">Desde'+monthSelect('from',state.fromVal)+'</label>'+
        '<label style="display:flex;flex-direction:column;gap:4px;font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)">Hasta'+monthSelect('to',state.toVal)+'</label>'+
        '<div><div style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px">Rangos</div>'+
          '<div style="display:flex;gap:7px;flex-wrap:wrap">'+rangoBtns+'</div></div>'+
      '</div>'+
      buildMainChart()+
      '<div style="font-size:10.5px;color:var(--muted);margin-top:8px">El modelo usa señales como protestas recientes, denuncias ambientales, noticias y el calendario de fechas críticas; se actualiza cada semana (pase el cursor para ver el valor exacto). Todo el histórico se calculó con el mismo modelo de forma consistente, sin saltos artificiales.</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">'+legendBtns+'</div>'+
    '</section>';
  }

  function kpiSection(){
    var zonas=state.data.zonas||[];
    var modelo=modeloZonas();
    var conProb=modelo.filter(function(z){return z.prob_actual!=null;});
    var maxZona=conProb.slice().sort(function(a,b){return b.prob_actual-a.prob_actual;})[0];
    var enAlerta=modelo.filter(function(z){return z.nivel_riesgo==='ALTO'||z.nivel_riesgo==='MEDIO ALTO';});
    var eventos4w=zonas.reduce(function(s,z){return s+(z.eventos_4w||0);},0);

    var kpis=[
      {label:'Nivel más alto (30 días)',value: maxZona?esc(maxZona.nivel_riesgo||'—'):'—', sub: maxZona?(esc(zonaLabel(maxZona))+' · '+fmtPct(maxZona.prob_actual)):'Sin datos aún', color: maxZona?levelColor(maxZona.nivel_riesgo):'var(--hi)'},
      {label:'Zonas en alerta (30 días)',value: modelo.length?(enAlerta.length+' / '+modelo.length):'—', sub: enAlerta.length?enAlerta.map(zonaLabel).join(', '):'Ninguna en este momento', color:'var(--hi)'},
      {label:'Eventos últimas 4 semanas',value: ''+eventos4w, sub:'Suma de las '+zonas.length+' zonas', color:'var(--accent)'}
    ];
    return '<section style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px">'+
      kpis.map(function(k){
        return '<div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:15px 16px;display:flex;flex-direction:column;gap:7px;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<span style="width:9px;height:9px;border-radius:3px;background:'+k.color+'"></span>'+
            '<span style="font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700">'+k.label+'</span>'+
          '</div>'+
          '<div style="font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1;color:'+k.color+'">'+k.value+'</div>'+
          '<div style="font-size:11.5px;color:var(--sub);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+k.sub+'</div>'+
        '</div>';
      }).join('')+
    '</section>';
  }

  function fmtEvidencia(v){
    var m={evidencia_fuerte:'fuerte',evidencia_moderada:'moderada',evidencia_debil:'débil',sin_evidencia:'sin evidencia',artefacto_crisis:'sin evidencia',muestra_chica:'muestra chica',sin_datos_suficientes:'datos insuficientes'};
    return v?(m[v]||v.replace(/_/g,' ')):null;
  }
  function fmtFuenteTag(v){
    var m={modelo:'análisis del modelo (contra base de 410 incidentes 2001-2026)',contexto_dashboard:'análisis del equipo, fuera del modelo'};
    return v?(m[v]||v):null;
  }

  function mapRankingDetail(){
    var zonas=state.data.zonas||[];
    var sel=state.selected;
    var selZona=sel?zonas.filter(function(z){return z.zona_id===sel;})[0]:null;
    var clearBtn=sel?'<button data-action="clear-selection" style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px">'+esc(zonaLabel(selZona))+' ✕</button>':'';

    var pins=zonas.map(function(z){
      var puntos=(z.mapa_x!=null&&z.mapa_y!=null)?[{nombre:null,x:z.mapa_x,y:z.mapa_y}]:(ZONA_DISTRITOS[z.zona_id]||[]);
      var isSel=sel===z.zona_id, hov=state.hoverPin===z.zona_id;
      var zi=isSel||hov?15:5;
      var showChip=hov||isSel;
      var badge = z.track==='modelo'
        ? ('<span style="font-size:15px;font-weight:800;color:'+levelColor(z.nivel_riesgo)+'">'+esc(z.nivel_riesgo||'—')+'</span>'+
           '<div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:1px">'+fmtPct(z.prob_actual)+' de probabilidad</div>')
        : '<span style="font-size:10.5px;font-weight:700;color:var(--muted);background:var(--panel2);padding:2px 7px;border-radius:999px">Sin modelo predictivo aún</span>';
      var chip=showChip?(
        '<div style="position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 22px rgba(0,0,0,.22);padding:8px 11px;white-space:nowrap;z-index:20">'+
          '<div style="font-size:11.5px;font-weight:800">'+esc(zonaLabel(z))+'</div>'+
          '<div style="margin-top:3px">'+badge+'</div></div>'
      ):'';
      return puntos.map(function(p,i){
        var isPrimary=i===0;
        var size=isPrimary?(isSel?26:20):(isSel?17:13);
        var ring=isSel?'8px':(hov?'6px':'0px');
        var chipHere=(showChip&&isPrimary)?chip:'';
        var pulse=isPrimary?'<span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:'+zonaColor(z.zona_id)+';animation:pulseRing 2.4s ease-out infinite"></span>':'';
        return '<div data-pin="'+z.zona_id+'" title="'+esc(p.nombre||zonaLabel(z))+'" style="position:absolute;left:'+p.x+'%;top:'+p.y+'%;transform:translate(-50%,-50%);cursor:pointer;z-index:'+(isPrimary?zi:zi-1)+'">'+
          pulse+
          '<span style="position:relative;display:block;width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+zonaColor(z.zona_id)+';border:'+(isPrimary?'3px':'2px')+' solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.35),0 0 0 '+ring+' color-mix(in srgb,'+zonaColor(z.zona_id)+' 30%,transparent)"></span>'+
          chipHere+
        '</div>';
      }).join('');
    }).join('');

    var detallesZonasHtml=zonas.map(function(z,i){
      var isSel=sel===z.zona_id;
      var mini = z.track==='modelo' ? [
        {k:'Probabilidad (30 días)',v:fmtPct(z.prob_actual),color:levelColor(z.nivel_riesgo)},
        {k:'Cambio vs. sem. anterior',v: z.tendencia_delta==null?'—':((z.tendencia_delta>=0?'↑ +':'↓ ')+Math.round(z.tendencia_delta*100)+' pts'),color:'var(--text)'},
        {k:'Eventos (4 sem.)',v:''+(z.eventos_4w==null?'—':z.eventos_4w),color:'var(--text)'},
        {k:'Días s/ última protesta',v:''+(z.dias_desde_ultima_protesta==null?'—':z.dias_desde_ultima_protesta),color:'var(--text)'}
      ] : [
        {k:'Tasa histórica',v:fmtPct1(z.tasa_historica),color:'var(--text)'},
        {k:'Denuncias OEFA (4 sem.)',v:''+(z.oefa_denuncias_4w==null?'—':z.oefa_denuncias_4w),color:'var(--text)'},
        {k:'Eventos (4 sem.)',v:''+(z.eventos_4w==null?'—':z.eventos_4w),color:'var(--text)'},
        {k:'Días s/ última protesta',v:''+(z.dias_desde_ultima_protesta==null?'—':z.dias_desde_ultima_protesta),color:'var(--text)'}
      ];
      var miniHtml=mini.map(function(m){
        return '<div style="background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:7px 9px">'+
          '<div style="font-size:9px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);font-weight:700">'+m.k+'</div>'+
          '<div style="font-size:15px;font-weight:800;margin-top:2px;color:'+m.color+'">'+m.v+'</div></div>';
      }).join('');
      var levelBadge = z.track==='modelo'
        ? '<span style="flex:none;font-size:10.5px;font-weight:700;color:'+levelColor(z.nivel_riesgo)+';background:'+levelSoft(z.nivel_riesgo)+';padding:3px 10px;border-radius:999px;border:1px solid color-mix(in srgb,'+levelColor(z.nivel_riesgo)+' 30%,transparent)">'+esc(z.nivel_riesgo||'—')+'</span>'
        : '<span style="flex:none;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--panel);padding:3px 10px;border-radius:999px;border:1px solid var(--border)">Estimación por historial</span>';
      var explicacion=explicacionNivel(z);
      var explicacionHtml=explicacion?'<div style="font-size:11.5px;line-height:1.5;color:var(--sub);font-style:italic;margin-top:8px">'+esc(explicacion)+'</div>':'';
      var alertaElectoralHtml=z.alerta_electoral?(
        '<div style="font-size:11px;color:#8b5cf6;margin-top:6px"><strong>Alerta electoral:</strong> <span style="color:var(--text)">'+esc(z.alerta_electoral.accion_recomendada||'')+'</span></div>'
      ):'';
      var descAccionHtml=(z.descripcion||z.accion_recomendada)?(
        '<div style="font-size:11.5px;line-height:1.5;color:var(--sub);margin-top:8px">'+(z.descripcion?esc(z.descripcion):'')+(z.accion_recomendada?(' <strong style="color:var(--text)">Acción:</strong> '+esc(z.accion_recomendada)):'')+'</div>'
      ):'';
      return '<div data-action="select-zone" data-zone="'+z.zona_id+'" style="cursor:pointer;padding:12px;border-radius:12px;border:1.5px solid '+(isSel?'color-mix(in srgb,var(--accent) 45%,transparent)':'var(--border)')+';background:'+(isSel?'var(--accent-soft)':'var(--panel2)')+(i>0?';margin-top:10px':'')+'">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">'+
          '<span style="display:flex;align-items:center;gap:7px;min-width:0;font-weight:800;font-size:13px;color:var(--text)"><span style="width:9px;height:9px;border-radius:3px;background:'+zonaColor(z.zona_id)+';flex:none"></span>'+esc(zonaLabel(z))+'</span>'+
          levelBadge+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px">'+miniHtml+'</div>'+
        explicacionHtml+descAccionHtml+alertaElectoralHtml+
      '</div>';
    }).join('');

    var proximas=proximasFechasCriticas().slice(0,12);
    var proximasHtml = proximas.length ? proximas.map(function(p){
      var evid=fmtEvidencia(p.evidencia_historica);
      var fuente=fmtFuenteTag(p.fuente);
      var fuenteTexto=(evid?('Evidencia histórica: '+evid):'')+(evid&&fuente?' · ':'')+(fuente?('Fuente: '+fuente):'');
      var fuenteIcon = p.fuente_url
        ? '<a href="'+esc(p.fuente_url)+'" target="_blank" rel="noopener noreferrer" title="'+esc(fuenteTexto?fuenteTexto+' · abrir fuente':'Abrir fuente')+'" style="flex:none;cursor:pointer;color:var(--accent);text-decoration:none;border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:10px">↗</a>'
        : (fuenteTexto ? '<span title="'+esc(fuenteTexto+' · análisis interno sobre datos privados del cliente, sin documento público que enlazar')+'" style="flex:none;cursor:help;color:var(--muted);opacity:.6;border:1px solid var(--border);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:9.5px;font-style:italic;font-weight:700">i</span>' : '');
      var dias = p.dias_restantes;
      var diasTxt = dias==null?'':(dias===0?'hoy':dias===1?'en 1 día':'en '+dias+' días');
      var critBadge = p.criticidad ? '<span style="flex:none;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:'+criticidadColor(p.criticidad)+';background:color-mix(in srgb,'+criticidadColor(p.criticidad)+' 14%,var(--panel2));border:1px solid color-mix(in srgb,'+criticidadColor(p.criticidad)+' 30%,transparent);border-radius:999px;padding:2px 8px">'+p.criticidad.replace(/_/g,' ')+'</span>' : '';
      return '<div style="padding:9px 0;border-bottom:1px solid var(--border)">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
          '<div style="min-width:0;font-size:12px;font-weight:700;color:var(--text)">'+esc(p.evento)+'</div>'+
          '<div style="flex:none;text-align:right">'+
            '<div style="font-size:12px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">'+p.fecha+'</div>'+
            (diasTxt?('<div style="font-size:9.5px;color:var(--muted);margin-top:1px">'+diasTxt+'</div>'):'')+
          '</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-top:4px">'+critBadge+'<span style="font-size:10.5px;color:var(--muted)">'+p.zonas.join(', ')+'</span></div>'+
        (fuenteTexto||fuenteIcon?('<div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4">'+
          '<span style="min-width:0">'+fuenteTexto+'</span>'+fuenteIcon+
        '</div>'):'')+
      '</div>';
    }).join('') : '<div style="color:var(--muted);font-size:12px;padding:10px 0">Sin fechas críticas próximas registradas.</div>';

    return '<section style="display:grid;grid-template-columns:1.3fr 1.3fr 1fr;gap:14px;margin-top:16px">'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px 16px 14px;display:flex;flex-direction:column">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">'+
          '<div style="font-size:14.5px;font-weight:800">Mapa ejecutivo · Cajamarca</div>'+clearBtn+
        '</div>'+
        '<div style="position:relative;flex:1;min-height:340px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background-image:url(\'images/mapa.png\');background-size:cover;background-position:center">'+
          '<div style="position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-start;padding:12px">'+
            '<span style="font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:#3a4650;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.6);border-radius:6px;padding:4px 9px">posición aproximada por distrito</span>'+
          '</div>'+pins+
        '</div>'+
        '<div style="font-size:10.5px;color:var(--muted);margin-top:9px;font-weight:500">Pase el cursor para ver el detalle · haga clic en una zona para filtrar todo el tablero.</div>'+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column">'+
        '<div style="font-size:14.5px;font-weight:800;margin-bottom:2px">Detalle de las zonas</div>'+detallesZonasHtml+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;min-height:0">'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<div style="font-size:14.5px;font-weight:800">Próximas fechas críticas</div>'+
          '<span style="cursor:help;color:var(--muted);font-size:11px;font-weight:800;border:1px solid var(--border);border-radius:50%;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;flex:none" title="Solo se muestran fechas con respaldo histórico confirmado contra una base de 410 incidentes registrados en Cajamarca (2001-2026). Festividades sin evidencia directa quedan fuera de esta lista aunque estén en el calendario.">?</span>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--sub);margin-top:2px;margin-bottom:4px">'+proximas.length+' fechas con evidencia histórica, próximos 12 meses</div>'+
        '<div style="overflow-y:auto;max-height:460px">'+proximasHtml+'</div>'+
      '</div>'+
    '</section>';
  }

  function sourcesSection(){
    return '<section style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
      '<span style="font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:800">Fuentes de datos</span>'+
      '<div style="display:flex;gap:9px;flex-wrap:wrap">'+
        SOURCES.map(function(s){
          return '<span style="display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--border);border-radius:999px;padding:6px 12px" title="'+esc(s.desc)+'">'+
            '<span style="width:6px;height:6px;border-radius:50%;background:var(--lo)"></span>'+
            '<span style="font-size:12px;font-weight:600;color:var(--text)">'+esc(s.name)+'</span></span>';
        }).join('')+
      '</div>'+
    '</section>';
  }

  function severidadColor(s){
    if(s==='alto') return 'var(--hi)';
    if(s==='medio') return 'var(--med)';
    if(s==='bajo') return 'var(--lo)';
    return 'var(--muted)';
  }

  function tableSection(){
    var zonas=(state.data.zonas||[]).slice();
    var sel=state.selected;
    var selZona=sel?zonas.filter(function(z){return z.zona_id===sel;})[0]:null;
    var clearBtn=sel?'<button data-action="clear-selection" style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px">'+esc(zonaLabel(selZona))+' ✕ Ver todas</button>':'';

    var eventos=(state.data.eventos_historicos||[]).slice();
    var rows=sel?eventos.filter(function(e){return e.zona_id===sel;}):eventos;
    rows.sort(function(a,b){return a.fecha<b.fecha?1:-1;});

    var rangoTxt = eventos.length ? (' · '+eventos[eventos.length-1].fecha+' a '+eventos[0].fecha) : '';

    var body=rows.map(function(e){
      var zonaObj=zonas.filter(function(z){return z.zona_id===e.zona_id;})[0];
      var zonaTxt=zonaObj?zonaLabel(zonaObj):e.zona_id;
      var sevBadge = e.severidad
        ? '<span style="display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;color:'+severidadColor(e.severidad)+';background:color-mix(in srgb,'+severidadColor(e.severidad)+' 14%,var(--panel2));padding:3px 10px;border-radius:999px;border:1px solid color-mix(in srgb,'+severidadColor(e.severidad)+' 28%,transparent)">'+esc(e.severidad)+'</span>'
        : '—';
      return '<tr style="border-bottom:1px solid var(--border)">'+
        '<td style="padding:11px 16px;color:var(--sub);font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap">'+e.fecha+'</td>'+
        '<td style="padding:11px 12px"><span style="display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap"><span style="width:9px;height:9px;border-radius:3px;background:'+zonaColor(e.zona_id)+';flex:none"></span>'+esc(zonaTxt)+'</span></td>'+
        '<td style="padding:11px 12px;color:var(--text);font-weight:500">'+esc(e.evento||'—')+'</td>'+
        '<td style="padding:11px 12px;text-align:center">'+sevBadge+'</td>'+
        '<td style="padding:11px 16px;text-align:center">'+(e.fuente_url?('<a href="'+esc(e.fuente_url)+'" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 10px;border-radius:999px;text-decoration:none">Ver fuente ↗</a>'):'—')+'</td>'+
      '</tr>';
    }).join('');

    return '<section style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 20px 12px;flex-wrap:wrap">'+
        '<div><div style="font-size:15px;font-weight:800">Historial de eventos de protesta y conflicto social</div>'+
        '<div style="font-size:11.5px;color:var(--sub);margin-top:2px">'+rows.length+' eventos'+(sel?' en '+esc(zonaLabel(selZona)):' registrados')+rangoTxt+' · fuente verificable por evento (monitoreo FRM01)</div></div>'+
        clearBtn+
      '</div>'+
      '<div style="overflow-x:auto;overflow-y:auto;max-height:560px">'+
        '<table style="width:100%;border-collapse:collapse;font-size:12.5px">'+
        '<thead><tr style="background:var(--panel2)">'+
          '<th style="text-align:left;padding:10px 16px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel2)">Fecha</th>'+
          '<th style="text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel2)">UGT</th>'+
          '<th style="text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel2)">Evento</th>'+
          '<th style="text-align:center;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel2)">Severidad</th>'+
          '<th style="text-align:center;padding:10px 16px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel2)">Fuente</th>'+
        '</tr></thead><tbody>'+body+'</tbody></table>'+
      '</div>'+
    '</section>';
  }

  function actoresSection(){
    var actores=(state.data.actores_criticos||[]).slice();
    if(!actores.length) return '';
    var actualizado=state.data.meta?state.data.meta.actores_criticos_actualizado:null;

    var body=actores.map(function(a){
      var meta=[];
      if(a.ultima_mencion_aprox) meta.push('Última mención conocida: '+a.ultima_mencion_aprox);
      meta.push(a.n_apariciones+(a.n_apariciones===1?' reporte':' reportes'));
      return '<div style="padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap">'+
          '<span style="font-weight:700;font-size:12.5px;color:var(--text)">'+esc(a.nombre)+'</span>'+
          '<span style="font-size:10px;color:var(--muted);white-space:nowrap">'+esc(meta.join(' · '))+'</span>'+
        '</div>'+
        (a.cargo_o_rol||a.distrito_o_zona?('<div style="font-size:11px;color:var(--sub);margin-top:2px">'+[a.cargo_o_rol,a.distrito_o_zona].filter(Boolean).map(esc).join(' · ')+'</div>'):'')+
        (a.contexto_resumen?('<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5">'+esc(a.contexto_resumen)+'</div>'):'')+
      '</div>';
    }).join('');

    return '<section style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden">'+
      '<div style="padding:16px 20px 10px">'+
        '<div style="font-size:14px;font-weight:800;color:var(--sub)">Actores relevantes en la conflictividad social</div>'+
        '<div style="font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5">'+actores.length+' actores (alcaldes, dirigentes, voceros y funcionarios) mencionados en reportes quincenales de campo · contexto informativo, no una señal validada del modelo · catálogo estático'+(actualizado?(', cargado '+esc(actualizado)):'')+' — no es monitoreo en tiempo real.</div>'+
      '</div>'+
      '<div style="padding:0 20px 14px;overflow-y:auto;max-height:480px">'+body+'</div>'+
    '</section>';
  }

  function footer(){
    var gen=state.data&&state.data.meta?state.data.meta.generado_en:null;
    return '<div style="text-align:center;font-size:11px;color:var(--muted);margin-top:22px;font-weight:500">PROTECTA Perú · Sistema de Alerta Temprana de Conflictos Sociales'+(gen?(' · datos generados '+esc(gen)):'')+'</div>';
  }

  /* ---------- render ---------- */
  var root = document.getElementById('root');

  function shell(inner){
    return '<div data-theme="'+(state.dark?'dark':'light')+'" style="min-height:100vh;background:var(--bg);color:var(--text);font-family:Manrope,system-ui,sans-serif;transition:background .25s,color .25s">'+
      '<div style="max-width:1380px;margin:0 auto;padding:22px 26px 60px">'+inner+'</div></div>';
  }

  function render(){
    var html;
    if(state.loadError){
      html = shell(header()+
        '<div style="margin-top:24px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:28px;text-align:center;color:var(--sub);font-size:13px">'+
          'No se pudieron cargar los datos del tablero (<code>data/data.json</code>). Verifique que el archivo exista y sea accesible, luego recargue la página.'+
        '</div>');
    } else if(!state.data){
      html = shell(header()+
        '<div style="margin-top:24px;text-align:center;color:var(--muted);font-size:13px;padding:60px 0">Cargando datos del tablero…</div>');
    } else {
      html = shell(header()+banner()+mainChartSection()+kpiSection()+mapRankingDetail()+tableSection()+actoresSection()+sourcesSection()+footer());
    }
    root.innerHTML = html;
    wireMainChart();
  }

  function wireMainChart(){
    var svg = root.querySelector('[data-chart="main"]');
    if(!svg) return;
    var g=MAIN, padL=g.padL,padR=g.padR,cw=g.cw;
    var W=cw-padL-padR;
    svg.addEventListener('mousemove',function(e){
      var dom=mainChartDomain();
      if(!dom) return;
      var rect=svg.getBoundingClientRect();
      var scale=rect.width/cw;
      var localX=(e.clientX-rect.left)/scale;
      var frac=clamp((localX-padL)/W,0,1);
      var ms=dom.minMs+frac*(dom.maxMs-dom.minMs);
      var inForecast = dom.horizonEndMs>dom.trueMaxMs && ms>dom.trueMaxMs && ms<=dom.maxMs;
      if(inForecast){
        if(!state.hoverForecast || state.hover!==null){ state.hoverForecast=true; state.hover=null; render(); }
        return;
      }
      if(!dom.allMs.length) return;
      var uniqMs=[]; var seenMs={};
      dom.allMs.forEach(function(m){ if(!seenMs[m]){seenMs[m]=1; uniqMs.push(m);} });
      var nearest=uniqMs.reduce(function(best,m){ return Math.abs(m-ms)<Math.abs(best-ms)?m:best; }, uniqMs[0]);
      if(nearest!==state.hover || state.hoverForecast){ state.hover=nearest; state.hoverForecast=false; render(); }
    });
    svg.addEventListener('mouseleave',function(){
      if(state.hover!==null || state.hoverForecast){ state.hover=null; state.hoverForecast=false; render(); }
    });
  }

  /* ---------- event delegation ---------- */
  root.addEventListener('click',function(e){
    var t=e.target.closest('[data-action]');
    if(!t) return;
    var action=t.getAttribute('data-action');
    if(action==='toggle-theme'){ state.dark=!state.dark; render(); }
    else if(action==='toggle-legend'){ var z=t.getAttribute('data-zone'); state.hidden[z]=!state.hidden[z]; render(); }
    else if(action==='select-zone'){ var z2=t.getAttribute('data-zone'); state.selected=(state.selected===z2?null:z2); render(); }
    else if(action==='clear-selection'){ state.selected=null; render(); }
    else if(action==='set-gran'){ state.gran=t.getAttribute('data-value'); state.hover=null; render(); }
    else if(action==='rango'){
      var rb=realBounds();
      if(rb){
        var earliestKey=keyOfMonth(rb.trueMinMs), lastRealKey=keyOfMonth(rb.trueMaxMs), horizonKey=keyOfMonth(rb.horizonEndMs);
        var kind=t.getAttribute('data-kind');
        if(kind==='6m'){ state.fromVal=maxKey(earliestKey, shiftMonth(lastRealKey,-6)); state.toVal=horizonKey; }
        else if(kind==='12m'){ state.fromVal=maxKey(earliestKey, shiftMonth(lastRealKey,-12)); state.toVal=horizonKey; }
        else if(kind==='todo'){ state.fromVal=earliestKey; state.toVal=horizonKey; }
        else if(kind==='pronostico'){ state.fromVal=lastRealKey; state.toVal=horizonKey; }
      }
      state.hover=null; render();
    }
  });

  root.addEventListener('change',function(e){
    if(e.target.matches('select[data-role="from"]')){ state.fromVal=e.target.value; state.hover=null; render(); }
    else if(e.target.matches('select[data-role="to"]')){ state.toVal=e.target.value; state.hover=null; render(); }
  });

  root.addEventListener('mouseover',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin){ var id=pin.getAttribute('data-pin'); if(state.hoverPin!==id){ state.hoverPin=id; render(); } }
  });
  root.addEventListener('mouseout',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin && !(e.relatedTarget && pin.contains(e.relatedTarget))){ if(state.hoverPin){ state.hoverPin=null; render(); } }
  });
  root.addEventListener('click',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin){ var id=pin.getAttribute('data-pin'); state.selected=(state.selected===id?null:id); render(); }
  });

  render();

  fetch('./data/data.json?v='+Date.now(), {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ state.data=data; render(); })
    .catch(function(err){ state.loadError=err; render(); });
})();
</script>
</body>
</html>
