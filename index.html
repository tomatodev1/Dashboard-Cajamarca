<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sistema de Alerta Temprana · PROTECTA Perú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef4fa;--panel:#ffffff;--panel2:#f6fafd;--text:#132430;--sub:#59697a;--muted:#93a0ac;--border:#e3eaf2;--grid:#eaf0f6;--accent:#2b7cc0;--accent-soft:#e7f1fb;--hi:#dc2626;--med:#d97706;--med-alto:#c2410c;--lo:#16a34a;--hi-soft:#fdecec;--med-soft:#fdf3e6;--med-alto-soft:#fce4d6;--lo-soft:#e9f7ef;--shadow:0 1px 2px rgba(20,45,75,.05),0 6px 22px rgba(20,45,75,.055);}
[data-theme="dark"]{--bg:#0d141b;--panel:#151f29;--panel2:#111a23;--text:#e8eef4;--sub:#9fb0bf;--muted:#647380;--border:#243342;--grid:#1d2833;--accent:#4aa3e0;--accent-soft:#132738;--hi:#f0554d;--med:#e2942f;--med-alto:#f2872f;--lo:#38b06e;--hi-soft:#2a1615;--med-soft:#241a10;--med-alto-soft:#2a1a10;--lo-soft:#122318;--shadow:0 1px 2px rgba(0,0,0,.35),0 10px 26px rgba(0,0,0,.35);}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-family:Manrope,system-ui,sans-serif}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button,select{font-family:inherit}
button{outline:none}
::selection{background:var(--accent-soft)}
@keyframes pulseRing{0%{transform:scale(1);opacity:.55}70%{transform:scale(2.6);opacity:0}100%{opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  "use strict";

  var ALL_ZONAS = ["UGT1","UGT2"];
  var ZONA_COLORS = {UGT1:'#2b7cc0',UGT2:'#d64545'};
  var FALLBACK_POS = {UGT1:{x:35,y:40},UGT2:{x:65,y:55}};
  var NIVEL_ORDER = ["BAJO","MEDIO","MEDIO ALTO","ALTO"];

  var SOURCES = [
    {name:'Defensoría del Pueblo',desc:'Escalamiento de conflictos sociales reportados'},
    {name:'OEFA',desc:'Denuncias ambientales por zona'},
    {name:'INEI',desc:'Indicadores socioeconómicos y de pobreza'},
    {name:'Monitoreo de medios',desc:'Volumen y tono de noticias locales/regionales'},
    {name:'Calendario cívico-electoral',desc:'Fechas críticas, festividades y proceso electoral 2026'}
  ];

  /* ---------- helpers ---------- */
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function fmtPct(v){return v==null?'—':Math.round(v*100)+'%';}
  function fmtPct1(v){return v==null?'—':(Math.round(v*1000)/10)+'%';}
  function niceMax(v){ if(v<=0) return 10; var p=Math.pow(10,Math.floor(Math.log10(v))); var n=Math.ceil(v/p)*p; return n<v*1.15?n*1.5:n; }
  function levelColor(l){
    if(l==='ALTO') return 'var(--hi)';
    if(l==='MEDIO ALTO') return 'var(--med-alto)';
    if(l==='MEDIO') return 'var(--med)';
    if(l==='BAJO') return 'var(--lo)';
    return 'var(--muted)';
  }
  function levelSoft(l){
    if(l==='ALTO') return 'var(--hi-soft)';
    if(l==='MEDIO ALTO') return 'var(--med-alto-soft)';
    if(l==='MEDIO') return 'var(--med-soft)';
    if(l==='BAJO') return 'var(--lo-soft)';
    return 'var(--panel2)';
  }
  function zonaColor(id){ return ZONA_COLORS[id] || 'var(--muted)'; }
  function zonaLabel(z){ return (z && z.nombre) ? z.nombre : (z ? z.zona_id : ''); }
  function explicacionNivel(z){
    var factores=[];
    if(z.racha_semanas_protesta!=null && z.racha_semanas_protesta>0){
      factores.push('una racha activa de protestas ('+z.racha_semanas_protesta+' semana'+(z.racha_semanas_protesta>1?'s':'')+')');
    }
    if(z.dias_desde_ultima_protesta!=null){
      if(z.dias_desde_ultima_protesta<=14) factores.push('una protesta reciente (hace '+z.dias_desde_ultima_protesta+' días)');
      else if(z.dias_desde_ultima_protesta>90) factores.push('ausencia de protestas en los últimos '+z.dias_desde_ultima_protesta+' días');
    }
    if(z.proxima_fecha_critica){
      factores.push('una fecha crítica próxima ('+z.proxima_fecha_critica.evento+', '+z.proxima_fecha_critica.fecha+')');
    }
    if(z.eventos_4w!=null && z.eventos_4w>=3){
      factores.push(z.eventos_4w+' eventos registrados en las últimas 4 semanas');
    }
    if(!factores.length) return null;
    return 'Este nivel se explica principalmente por '+factores.slice(0,3).join(', ')+'.';
  }
  var DAY_MS = 86400000;
  var HORIZON_DAYS = 30; // prob en serie_tiempo ya es P(protesta <= 30 dias) desde el cierre de esa semana
  function parseYMD(s){ var p=s.split('-').map(Number); return Date.UTC(p[0],p[1]-1,p[2]); }
  function fmtDateISO(ms){ var d=new Date(ms); function p2(n){return n<10?'0'+n:''+n;} return d.getUTCFullYear()+'-'+p2(d.getUTCMonth()+1)+'-'+p2(d.getUTCDate()); }
  var MES_NOMBRES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  function fmtDayMonth(ms,withYear){ var d=new Date(ms); return d.getUTCDate()+' '+MES_NOMBRES[d.getUTCMonth()]+(withYear?(' '+d.getUTCFullYear()):''); }
  function keyOfMonth(ms){ var d=new Date(ms); return d.getUTCFullYear()+'-'+(d.getUTCMonth()+1<10?'0':'')+(d.getUTCMonth()+1); }
  function monthLabel(key){ var p=key.split('-'); return MES_NOMBRES[+p[1]-1]+' '+p[0]; }
  function shiftMonth(key,n){ var p=key.split('-'); var y=+p[0], m=+p[1]-1+n; while(m<0){m+=12;y--;} while(m>11){m-=12;y++;} return y+'-'+(m+1<10?'0':'')+(m+1); }
  function maxKey(a,b){ return a>b?a:b; }
  function lastDayOfMonth(key){ var p=key.split('-'); var y=+p[0], m=+p[1]-1; return Date.UTC(y,m+1,0); }
  function monthOptsRange(fromKey,toKey){ var out=[],k=fromKey,guard=0; while(k<=toKey&&guard<600){ out.push({v:k,label:monthLabel(k)}); k=shiftMonth(k,1); guard++; } return out; }

  /* ---------- state ---------- */
  var state = {
    dark:false,
    hidden:{}, hover:null, hoverForecast:false, hoverPin:null, selected:null,
    gran:'week', fromVal:null, toVal:null,
    data:null, loadError:null
  };

  /* ---------- chart geometry constants ---------- */
  var MAIN = {cw:960,ch:340,padL:42,padR:18,padT:18,padB:34};
  var ACT = {cw:300,ch:220,padL:34,padR:12,padT:14,padB:26};
  var REL = {cw:300,ch:190,padL:12,padR:12,padT:10};

  /* ---------- derived data helpers ---------- */
  function modeloZonas(){ return (state.data.zonas||[]).filter(function(z){return z.track==='modelo';}); }
  function serieByZona(){
    var out={};
    (state.data.serie_tiempo||[]).forEach(function(p){
      (out[p.zona_id]=out[p.zona_id]||[]).push(p);
    });
    Object.keys(out).forEach(function(k){ out[k].sort(function(a,b){return a.semana<b.semana?-1:1;}); });
    return out;
  }
  function allSemanas(){
    var set={};
    (state.data.serie_tiempo||[]).forEach(function(p){ set[p.semana]=true; });
    return Object.keys(set).sort();
  }
  function proximasFechasCriticas(){
    var byKey={};
    (state.data.zonas||[]).forEach(function(z){
      var pf=z.proxima_fecha_critica;
      if(!pf) return;
      var key=pf.fecha+'|'+pf.evento;
      if(!byKey[key]) byKey[key]={evento:pf.evento,fecha:pf.fecha,tipo:pf.tipo,criticidad:pf.criticidad,zonas:[]};
      byKey[key].zonas.push(z.zona_id);
    });
    var list=Object.keys(byKey).map(function(k){return byKey[k];});
    list.sort(function(a,b){return a.fecha<b.fecha?-1:1;});
    return list;
  }
  function realBounds(){
    var zonas=modeloZonas();
    var trueByZona=serieByZona();
    var allMs=[];
    zonas.forEach(function(z){ (trueByZona[z.zona_id]||[]).forEach(function(p){ allMs.push(parseYMD(p.semana)); }); });
    if(!allMs.length) return null;
    var trueMinMs=Math.min.apply(null,allMs);
    var trueMaxMs=Math.max.apply(null,allMs);
    var lastEnds=[];
    zonas.forEach(function(z){
      var pts=(trueByZona[z.zona_id]||[]);
      if(pts.length) lastEnds.push(parseYMD(pts[pts.length-1].semana)+HORIZON_DAYS*DAY_MS);
    });
    var horizonEndMs=Math.max.apply(null, lastEnds.concat([trueMinMs+DAY_MS]));
    return {trueByZona:trueByZona, trueMinMs:trueMinMs, trueMaxMs:trueMaxMs, horizonEndMs:horizonEndMs};
  }
  function ensureDefaultRange(rb){
    if(!rb || (state.fromVal && state.toVal)) return;
    var earliestKey=keyOfMonth(rb.trueMinMs);
    var horizonKey=keyOfMonth(rb.horizonEndMs);
    if(!state.fromVal) state.fromVal=earliestKey; // mostrar todo el histórico disponible por defecto
    if(!state.toVal) state.toVal=horizonKey;
  }
  function displaySeries(gran){
    var trueByZona=serieByZona();
    if(gran!=='month') return trueByZona;
    var out={};
    Object.keys(trueByZona).forEach(function(zid){
      var groups={};
      trueByZona[zid].forEach(function(p){
        var k=keyOfMonth(parseYMD(p.semana));
        if(!groups[k]) groups[k]={sum:0,count:0};
        groups[k].sum+=p.prob; groups[k].count++;
      });
      out[zid]=Object.keys(groups).sort().map(function(k){ return {semana:k+'-15', prob:groups[k].sum/groups[k].count}; });
    });
    return out;
  }
  function mainChartDomain(){
    var rb=realBounds();
    if(!rb) return null;
    ensureDefaultRange(rb);
    var zonas=modeloZonas();
    var fromMs=parseYMD(state.fromVal+'-01');
    var toEndMs=lastDayOfMonth(state.toVal);
    var disp=displaySeries(state.gran);
    var byZona={};
    zonas.forEach(function(z){
      byZona[z.zona_id]=(disp[z.zona_id]||[]).map(function(p){return {ms:parseYMD(p.semana),prob:p.prob,probDisplay:(p.prob_suavizado!=null?p.prob_suavizado:p.prob)};}).filter(function(p){return p.ms>=fromMs&&p.ms<=toEndMs;});
    });
    var allMs=[]; zonas.forEach(function(z){ byZona[z.zona_id].forEach(function(p){allMs.push(p.ms);}); });
    return {byZona:byZona, zonas:zonas, allMs:allMs, minMs:fromMs, maxMs:toEndMs,
      trueMaxMs:Math.min(rb.trueMaxMs,toEndMs), horizonEndMs:Math.min(rb.horizonEndMs,toEndMs), rawByZona:rb.trueByZona};
  }

  /* ---------- chart builders ---------- */
  function buildMainChart(){
    var g=MAIN, padL=g.padL,padR=g.padR,padT=g.padT,padB=g.padB,cw=g.cw,ch=g.ch;
    var W=cw-padL-padR,H=ch-padT-padB;
    var dom=mainChartDomain();
    if(!dom){
      return '<div style="padding:40px 0;text-align:center;color:var(--muted);font-size:12.5px">Aún no hay puntos en la serie de tiempo. Se irán acumulando semana a semana conforme corra el modelo.</div>';
    }
    var byZona=dom.byZona, zonas=dom.zonas, minMs=dom.minMs, maxMs=dom.maxMs, trueMaxMs=dom.trueMaxMs, horizonEndMs=dom.horizonEndMs;
    function X(ms){ return padL+(maxMs===minMs?0:(ms-minMs)/(maxMs-minMs))*W; }
    function Y(v){return padT+(1-v)*H;}
    var svg='';
    [0,0.25,0.5,0.75,1].forEach(function(gv){
      var y=Y(gv);
      svg+='<line x1="'+padL+'" x2="'+(cw-padR)+'" y1="'+y+'" y2="'+y+'" style="stroke:var(--grid)" stroke-width="1"></line>';
      svg+='<text x="'+(padL-8)+'" y="'+(y+3.5)+'" text-anchor="end" style="fill:var(--muted);font-size:10.5px;font-weight:600">'+Math.round(gv*100)+'%</text>';
    });
    var showCorte = trueMaxMs>=minMs && trueMaxMs<=maxMs;
    var showForecast = showCorte && horizonEndMs>trueMaxMs;
    if(showCorte){
      var xCorte=X(trueMaxMs);
      svg+='<line x1="'+xCorte+'" x2="'+xCorte+'" y1="'+padT+'" y2="'+(padT+H)+'" style="stroke:var(--med)" stroke-width="1.4" stroke-dasharray="4 3" opacity=".8"></line>';
      svg+='<text x="'+xCorte+'" y="'+(padT-6)+'" text-anchor="'+(showForecast?'start':'middle')+'" style="fill:var(--med);font-size:9.5px;font-weight:700">'+(showForecast?'Hoy · pronóstico →':'Hoy')+'</text>';
      if(showForecast){
        svg+='<rect x="'+xCorte+'" y="'+padT+'" width="'+((cw-padR)-xCorte)+'" height="'+H+'" style="fill:var(--med);opacity:.08"></rect>';
      }
    }
    zonas.forEach(function(z){
      if(state.hidden[z.zona_id]) return;
      var pts=(byZona[z.zona_id]||[]);
      var coords=pts.map(function(p){ return [X(p.ms),Y(p.probDisplay)]; });
      if(coords.length>1){
        svg+='<polyline points="'+coords.map(function(p){return p.join(',');}).join(' ')+'" fill="none" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"></polyline>';
      }
      coords.forEach(function(c){
        svg+='<circle cx="'+c[0]+'" cy="'+c[1]+'" r="3.4" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="1.4"></circle>';
      });
      if(showForecast){
        var rawPts=(dom.rawByZona[z.zona_id]||[]);
        if(rawPts.length){
          var lastRaw=rawPts[rawPts.length-1];
          var lastMs=parseYMD(lastRaw.semana);
          var segEndMs=Math.min(lastMs+HORIZON_DAYS*DAY_MS, maxMs);
          if(segEndMs>lastMs){
            var x1=X(lastMs), x2e=X(segEndMs), y1=Y(lastRaw.prob_suavizado!=null?lastRaw.prob_suavizado:lastRaw.prob);
            svg+='<line x1="'+x1+'" x2="'+x2e+'" y1="'+y1+'" y2="'+y1+'" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="2.2" stroke-dasharray="2 4" stroke-linecap="round" opacity=".8"></line>';
            svg+='<circle cx="'+x2e+'" cy="'+y1+'" r="3.6" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="1.4" opacity=".8"></circle>';
            // marca la fecha critica sobre el tramo de pronostico si cae dentro de esta ventana
            var pf=z.proxima_fecha_critica;
            if(pf){
              var pfMs=parseYMD(pf.fecha);
              if(pfMs>=lastMs && pfMs<=segEndMs){
                var xpf=X(pfMs);
                svg+='<line x1="'+xpf+'" x2="'+xpf+'" y1="'+(y1-9)+'" y2="'+(y1+9)+'" style="stroke:'+zonaColor(z.zona_id)+'" stroke-width="1.6" opacity=".9"></line>';
                svg+='<circle cx="'+xpf+'" cy="'+y1+'" r="4.5" fill="var(--panel)" stroke="'+zonaColor(z.zona_id)+'" stroke-width="2"></circle>';
              }
            }
          }
        }
      }
    });
    var uniqMs=[]; var seenMs={};
    dom.allMs.forEach(function(ms){ if(!seenMs[ms]){seenMs[ms]=1; uniqMs.push(ms);} });
    uniqMs.sort(function(a,b){return a-b;});
    var ticks=Math.min(8,uniqMs.length);
    for(var k=0;k<ticks;k++){
      var idx=Math.round(k/(ticks-1||1)*(uniqMs.length-1));
      var ms=uniqMs[idx];
      var x=X(ms);
      svg+='<text x="'+x+'" y="'+(ch-padB+20)+'" text-anchor="middle" style="fill:var(--muted);font-size:9.5px;font-weight:600">'+fmtDateISO(ms)+'</text>';
    }
    var tooltip='';
    var hi=state.hover;
    if(hi!=null){
      var x2=X(hi);
      svg+='<line x1="'+x2+'" x2="'+x2+'" y1="'+padT+'" y2="'+(padT+H)+'" style="stroke:var(--sub)" stroke-width="1" stroke-dasharray="3 3" opacity=".6"></line>';
      var rows='';
      zonas.forEach(function(z){
        if(state.hidden[z.zona_id]) return;
        var pt=(byZona[z.zona_id]||[]).filter(function(p){return p.ms===hi;})[0];
        if(!pt) return;
        var y3=Y(pt.probDisplay);
        svg+='<circle cx="'+x2+'" cy="'+y3+'" r="4.5" fill="'+zonaColor(z.zona_id)+'" stroke="var(--panel)" stroke-width="2"></circle>';
        rows+='<div style="display:flex;align-items:center;gap:6px;justify-content:space-between">'+
          '<span style="display:flex;align-items:center;gap:6px;color:var(--sub);font-weight:600">'+
          '<span style="width:8px;height:8px;border-radius:2px;background:'+zonaColor(z.zona_id)+';display:inline-block"></span>'+esc(zonaLabel(z))+'</span>'+
          '<strong style="color:var(--text);font-variant-numeric:tabular-nums">'+fmtPct(pt.prob)+'</strong></div>';
      });
      if(rows){
        var leftPct=clamp((x2/cw)*100,2,80);
        tooltip='<div style="position:absolute;left:'+leftPct+'%;top:'+(padT+6)+'px;width:190px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.22);padding:8px 11px;pointer-events:none;font-size:11.5px;z-index:5">'+
          '<div style="font-weight:800;font-size:11px;margin-bottom:6px;color:var(--text)">Semana del '+fmtDateISO(hi)+' · probabilidad de protesta (30 días)</div>'+rows+'</div>';
      }
    } else if(state.hoverForecast && showForecast){
      var frows='';
      zonas.forEach(function(z){
        if(state.hidden[z.zona_id]) return;
        var rawPts=(dom.rawByZona[z.zona_id]||[]);
        if(!rawPts.length) return;
        var lastRaw=rawPts[rawPts.length-1];
        var lastMsZ=parseYMD(lastRaw.semana);
        var segEndMsZ=Math.min(lastMsZ+HORIZON_DAYS*DAY_MS, maxMs);
        var explic=explicacionNivel(z);
        frows+='<div style="margin-bottom:8px">'+
          '<div style="display:flex;align-items:center;gap:6px;font-weight:800;color:var(--text)">'+
            '<span style="width:8px;height:8px;border-radius:2px;background:'+zonaColor(z.zona_id)+';display:inline-block"></span>'+esc(zonaLabel(z))+
          '</div>'+
          '<div style="color:var(--muted);font-size:10.5px;margin-top:2px">Vigente hasta '+fmtDateISO(segEndMsZ)+'</div>'+
          (explic?'<div style="color:var(--sub);margin-top:3px;line-height:1.4">'+esc(explic)+'</div>':'')+
        '</div>';
      });
      if(frows){
        var xMid=(X(trueMaxMs)+(cw-padR))/2;
        var leftPctF=clamp((xMid/cw)*100,2,72);
        tooltip='<div style="position:absolute;left:'+leftPctF+'%;top:'+(padT+6)+'px;width:220px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.22);padding:9px 12px;pointer-events:none;font-size:11.5px;z-index:5">'+
          '<div style="font-weight:800;font-size:11px;margin-bottom:6px;color:var(--med)">Contexto del pronóstico</div>'+frows+
          '<div style="font-size:10px;color:var(--muted);line-height:1.4;padding-top:4px;border-top:1px solid var(--border)">No es una predicción de tendencia — el modelo mantiene este valor durante toda la ventana. Esto es contexto real que puede influir en las próximas semanas.</div>'+
        '</div>';
      }
    }
    return '<div style="position:relative;width:100%;margin-top:8px">'+
      '<svg data-chart="main" width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'" style="display:block;width:100%;height:auto;cursor:crosshair">'+svg+'</svg>'+tooltip+'</div>';
  }

  function buildActivity(){
    var g=ACT, padL=g.padL,pR=g.padR,pT=g.padT,pB=g.padB,cw=g.cw,ch=g.ch;
    var W=cw-padL-pR,H=ch-pT-pB;
    var zonas=state.data.zonas||[];
    var maxV=niceMax(Math.max.apply(null,zonas.map(function(z){return z.eventos_4w||0;}).concat([1])));
    function Y(v){return pT+(1-v/maxV)*H;}
    var bw=W/zonas.length*0.5;
    var svg='';
    [0,maxV/2,maxV].forEach(function(gv){
      svg+='<line x1="'+padL+'" x2="'+(cw-pR)+'" y1="'+Y(gv)+'" y2="'+Y(gv)+'" style="stroke:var(--grid)"></line>';
      svg+='<text x="'+(padL-6)+'" y="'+(Y(gv)+3)+'" text-anchor="end" style="fill:var(--muted);font-size:9px">'+Math.round(gv)+'</text>';
    });
    zonas.forEach(function(z,i){
      var cx=padL+(i+0.5)/zonas.length*W;
      var x=cx-bw/2;
      var v=z.eventos_4w||0;
      var sel=state.selected&&state.selected!==z.zona_id;
      var op=sel?0.3:1;
      var y=Y(v),h=(pT+H)-y;
      svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(0,h)+'" rx="3" style="fill:'+zonaColor(z.zona_id)+'" opacity="'+op+'"></rect>';
      svg+='<text x="'+cx+'" y="'+(y-5)+'" text-anchor="middle" style="fill:var(--text);font-size:10px;font-weight:800" opacity="'+op+'">'+v+'</text>';
      svg+='<text x="'+cx+'" y="'+(ch-4)+'" text-anchor="middle" style="fill:var(--muted);font-size:9.5px;font-weight:700" opacity="'+op+'">'+z.zona_id+'</text>';
    });
    return '<svg width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'" style="display:block;width:100%;height:auto">'+svg+'</svg>';
  }

  function buildReliability(){
    var g=REL, padL=g.padL,padR=g.padR,padT=g.padT,cw=g.cw,ch=g.ch;
    var W=cw-padL-padR;
    // Este panel usa solo los 3 niveles basicos (BAJO/MEDIO/ALTO); MEDIO ALTO
    // es un nivel adicional que solo aplica a las predicciones por zona, no
    // al criterio de confiabilidad del modelo.
    var rows=(state.data.calibracion_modelo||[]).filter(function(b){return b.nivel!=='MEDIO ALTO';}).sort(function(a,b){return NIVEL_ORDER.indexOf(a.nivel)-NIVEL_ORDER.indexOf(b.nivel);});
    var svg='',bh=22,gap=(rows.length?(ch-padT-16-bh*rows.length)/Math.max(1,rows.length-1):0);
    gap=Math.max(gap,10);
    rows.forEach(function(b,i){
      var y=padT+8+i*(bh+gap);
      var color=levelColor(b.nivel);
      svg+='<text x="'+padL+'" y="'+(y-5)+'" style="fill:var(--sub);font-size:10.5px;font-weight:700">'+b.nivel+' <tspan style="fill:var(--muted);font-weight:600">(n='+b.n+')</tspan></text>';
      svg+='<rect x="'+padL+'" y="'+y+'" width="'+W+'" height="'+bh+'" rx="6" style="fill:var(--grid)"></rect>';
      svg+='<rect x="'+padL+'" y="'+y+'" width="'+(W*b.tasa_acierto)+'" height="'+bh+'" rx="6" style="fill:'+color+'"></rect>';
      svg+='<text x="'+(padL+Math.max(30,W*b.tasa_acierto)-8)+'" y="'+(y+bh/2+4)+'" text-anchor="end" style="fill:#fff;font-size:11px;font-weight:800">'+fmtPct1(b.tasa_acierto)+'</text>';
    });
    return '<svg width="'+cw+'" height="'+ch+'" viewBox="0 0 '+cw+' '+ch+'" style="display:block;width:100%;height:auto">'+svg+'</svg>';
  }

    var explicacionHtml = explicacion ? '<div style="font-size:12px;line-height:1.5;color:var(--sub);font-style:italic">'+esc(explicacion)+'</div>' : '';

    var descHtml = dz.descripcion ? esc(dz.descripcion) : '<span style="color:var(--muted)">Descripción pendiente de contenido editorial.</span>';
    var accionHtml = dz.accion_recomendada ? esc(dz.accion_recomendada) : '<span style="color:var(--muted)">Acción recomendada pendiente de definir.</span>';

    return '<section style="display:grid;grid-template-columns:1.55fr 1fr 1.15fr;gap:14px;margin-top:16px">'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px 16px 14px;display:flex;flex-direction:column">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">'+
          '<div style="font-size:14.5px;font-weight:800">Mapa ejecutivo · Cajamarca</div>'+clearBtn+
        '</div>'+
        '<div style="position:relative;flex:1;min-height:340px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:repeating-linear-gradient(135deg,var(--panel2),var(--panel2) 11px,transparent 11px,transparent 22px),linear-gradient(160deg,#dbe7f1,#c5d6e4)">'+
          '<div style="position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-start;padding:12px">'+
            '<span style="font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:#5a6b7a;background:rgba(255,255,255,.72);border:1px dashed #9fb2c1;border-radius:6px;padding:4px 9px">posición aproximada · pendiente mapa geográfico real</span>'+
          '</div>'+pins+
        '</div>'+
        '<div style="font-size:10.5px;color:var(--muted);margin-top:9px;font-weight:500">Pase el cursor para ver el detalle · haga clic en una zona para filtrar todo el tablero.</div>'+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:9px">'+
        '<div style="font-size:14.5px;font-weight:800;margin-bottom:2px">Ranking de riesgo</div>'+ranking+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;gap:13px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px">'+
          '<div style="font-size:14.5px;font-weight:800;min-width:0">'+esc(zonaLabel(dz))+'</div>'+levelBadge+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">'+miniHtml+'</div>'+
        explicacionHtml+
        '<div style="font-size:12.5px;line-height:1.55;color:var(--sub);font-weight:500">'+descHtml+'</div>'+
        '<div style="font-size:12.5px;line-height:1.55;color:var(--sub);font-weight:500;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px"><strong style="color:var(--text)">Acción recomendada:</strong> '+accionHtml+'</div>'+
        proximaHtml+
      '</div>'+
    '</section>';
  }

  function secondaryRow(){
    var proximas=proximasFechasCriticas().slice(0,6);
    var proximasHtml = proximas.length ? proximas.map(function(p){
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">'+
        '<div style="min-width:0">'+
          '<div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.evento)+'</div>'+
          '<div style="font-size:10.5px;color:var(--muted);margin-top:2px">'+p.zonas.join(', ')+(p.criticidad?(' · '+p.criticidad.replace(/_/g,' ')):'')+'</div>'+
        '</div>'+
        '<div style="flex:none;font-size:12px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums">'+p.fecha+'</div>'+
      '</div>';
    }).join('') : '<div style="color:var(--muted);font-size:12px;padding:10px 0">Sin fechas críticas próximas registradas.</div>';

    return '<section style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px">'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:17px 18px">'+
        '<div style="font-size:14px;font-weight:800">Actividad reciente por zona</div>'+
        '<div style="font-size:11.5px;color:var(--sub);margin-top:2px;margin-bottom:6px">Eventos registrados · últimas 4 semanas</div>'+
        buildActivity()+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:17px 18px">'+
        '<div style="font-size:14px;font-weight:800">Confiabilidad del modelo</div>'+
        '<div style="font-size:11.5px;color:var(--sub);margin-top:2px;margin-bottom:6px">De cada 10 alertas pasadas en este nivel, cuántas acertaron</div>'+
        buildReliability()+
      '</div>'+
      '<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:17px 18px;display:flex;flex-direction:column">'+
        '<div style="font-size:14px;font-weight:800">Próximas fechas críticas</div>'+
        '<div style="font-size:11.5px;color:var(--sub);margin-top:2px;margin-bottom:6px">Calendario cívico, festivo y electoral</div>'+
        '<div>'+proximasHtml+'</div>'+
      '</div>'+
    '</section>';
  }

  function sourcesSection(){
    return '<section style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
      '<span style="font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:800">Fuentes de datos</span>'+
      '<div style="display:flex;gap:9px;flex-wrap:wrap">'+
        SOURCES.map(function(s){
          return '<span style="display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--border);border-radius:999px;padding:6px 12px" title="'+esc(s.desc)+'">'+
            '<span style="width:6px;height:6px;border-radius:50%;background:var(--lo)"></span>'+
            '<span style="font-size:12px;font-weight:600;color:var(--text)">'+esc(s.name)+'</span></span>';
        }).join('')+
      '</div>'+
    '</section>';
  }

  function tableSection(){
    var zonas=(state.data.zonas||[]).slice();
    var sel=state.selected;
    var rows=sel?zonas.filter(function(z){return z.zona_id===sel;}):zonas;
    rows.sort(function(a,b){
      var pa=a.prob_actual==null?-1:a.prob_actual, pb=b.prob_actual==null?-1:b.prob_actual;
      return pb-pa;
    });
    var selZona=sel?zonas.filter(function(z){return z.zona_id===sel;})[0]:null;
    var clearBtn=sel?'<button data-action="clear-selection" style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--accent-soft);color:var(--accent);cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px">'+esc(zonaLabel(selZona))+' ✕ Ver todas</button>':'';

    var body=rows.map(function(z){
      var news='https://news.google.com/search?q='+encodeURIComponent(esc(zonaLabel(z))+' Cajamarca conflicto social');
      var scoreCell = z.track==='modelo'
        ? ('<span style="display:flex;align-items:center;gap:9px">'+
            '<span style="flex:1;height:7px;border-radius:4px;background:var(--grid);overflow:hidden;min-width:60px"><span style="display:block;height:100%;width:'+Math.round((z.prob_actual||0)*100)+'%;background:'+levelColor(z.nivel_riesgo)+';border-radius:4px"></span></span>'+
            '<span style="font-weight:800;font-variant-numeric:tabular-nums;color:'+levelColor(z.nivel_riesgo)+';width:38px">'+fmtPct(z.prob_actual)+'</span></span>')
        : ('<span style="color:var(--muted);font-size:11.5px">según historial: '+fmtPct1(z.tasa_historica)+'</span>');
      var nivelBadge = z.track==='modelo'
        ? '<span style="display:inline-block;font-size:10.5px;font-weight:800;color:'+levelColor(z.nivel_riesgo)+';background:'+levelSoft(z.nivel_riesgo)+';padding:3px 10px;border-radius:999px;border:1px solid color-mix(in srgb,'+levelColor(z.nivel_riesgo)+' 28%,transparent)">'+esc(z.nivel_riesgo||'—')+'</span>'
        : '<span style="display:inline-block;font-size:10.5px;font-weight:800;color:var(--muted);background:var(--panel2);padding:3px 10px;border-radius:999px;border:1px solid var(--border)">Estimado</span>';
      return '<tr style="border-bottom:1px solid var(--border)">'+
        '<td style="padding:11px 16px"><span style="display:inline-flex;align-items:center;gap:6px;font-weight:700"><span style="width:9px;height:9px;border-radius:3px;background:'+zonaColor(z.zona_id)+'"></span>'+esc(zonaLabel(z))+'</span></td>'+
        '<td style="padding:11px 12px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums">'+(z.eventos_4w==null?'—':z.eventos_4w)+'</td>'+
        '<td style="padding:11px 12px;color:var(--sub);font-variant-numeric:tabular-nums;font-weight:500">'+(z.dias_desde_ultima_protesta==null?'—':z.dias_desde_ultima_protesta)+'</td>'+
        '<td style="padding:11px 12px">'+scoreCell+'</td>'+
        '<td style="padding:11px 12px;color:var(--sub);font-weight:500">'+(z.proxima_fecha_critica?(esc(z.proxima_fecha_critica.evento)+' · '+z.proxima_fecha_critica.fecha):'—')+'</td>'+
        '<td style="padding:11px 12px;text-align:center">'+nivelBadge+'</td>'+
        '<td style="padding:11px 16px;text-align:center"><a href="'+news+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:5px 10px;border-radius:999px;text-decoration:none">Ver ↗</a></td>'+
      '</tr>';
    }).join('');

    return '<section style="margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 20px 12px;flex-wrap:wrap">'+
        '<div><div style="font-size:15px;font-weight:800">Zonas priorizadas</div>'+
        '<div style="font-size:11.5px;color:var(--sub);margin-top:2px">'+rows.length+' UGT · ordenadas de mayor a menor riesgo</div></div>'+
        clearBtn+
      '</div>'+
      '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">'+
        '<thead><tr style="background:var(--panel2)">'+
          '<th style="text-align:left;padding:10px 16px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">UGT</th>'+
          '<th style="text-align:right;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">Eventos (4 semanas)</th>'+
          '<th style="text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">Días desde última protesta</th>'+
          '<th style="text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);min-width:120px">Probabilidad (30 días)</th>'+
          '<th style="text-align:left;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">Próxima fecha crítica</th>'+
          '<th style="text-align:center;padding:10px 12px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">Nivel</th>'+
          '<th style="text-align:center;padding:10px 16px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)">Noticias</th>'+
        '</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '</section>';
  }

  function footer(){
    var gen=state.data&&state.data.meta?state.data.meta.generado_en:null;
    return '<div style="text-align:center;font-size:11px;color:var(--muted);margin-top:22px;font-weight:500">PROTECTA Perú · Sistema de Alerta Temprana de Conflictos Sociales'+(gen?(' · datos generados '+esc(gen)):'')+'</div>';
  }

  /* ---------- render ---------- */
  var root = document.getElementById('root');

  function shell(inner){
    return '<div data-theme="'+(state.dark?'dark':'light')+'" style="min-height:100vh;background:var(--bg);color:var(--text);font-family:Manrope,system-ui,sans-serif;transition:background .25s,color .25s">'+
      '<div style="max-width:1380px;margin:0 auto;padding:22px 26px 60px">'+inner+'</div></div>';
  }

  function render(){
    var html;
    if(state.loadError){
      html = shell(header()+
        '<div style="margin-top:24px;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:28px;text-align:center;color:var(--sub);font-size:13px">'+
          'No se pudieron cargar los datos del tablero (<code>data/data.json</code>). Verifique que el archivo exista y sea accesible, luego recargue la página.'+
        '</div>');
    } else if(!state.data){
      html = shell(header()+
        '<div style="margin-top:24px;text-align:center;color:var(--muted);font-size:13px;padding:60px 0">Cargando datos del tablero…</div>');
    } else {
      html = shell(header()+banner()+mainChartSection()+kpiSection()+mapRankingDetail()+secondaryRow()+sourcesSection()+tableSection()+footer());
    }
    root.innerHTML = html;
    wireMainChart();
  }

  function wireMainChart(){
    var svg = root.querySelector('[data-chart="main"]');
    if(!svg) return;
    var g=MAIN, padL=g.padL,padR=g.padR,cw=g.cw;
    var W=cw-padL-padR;
    svg.addEventListener('mousemove',function(e){
      var dom=mainChartDomain();
      if(!dom) return;
      var rect=svg.getBoundingClientRect();
      var scale=rect.width/cw;
      var localX=(e.clientX-rect.left)/scale;
      var frac=clamp((localX-padL)/W,0,1);
      var ms=dom.minMs+frac*(dom.maxMs-dom.minMs);
      var inForecast = dom.horizonEndMs>dom.trueMaxMs && ms>dom.trueMaxMs && ms<=dom.maxMs;
      if(inForecast){
        if(!state.hoverForecast || state.hover!==null){ state.hoverForecast=true; state.hover=null; render(); }
        return;
      }
      if(!dom.allMs.length) return;
      var uniqMs=[]; var seenMs={};
      dom.allMs.forEach(function(m){ if(!seenMs[m]){seenMs[m]=1; uniqMs.push(m);} });
      var nearest=uniqMs.reduce(function(best,m){ return Math.abs(m-ms)<Math.abs(best-ms)?m:best; }, uniqMs[0]);
      if(nearest!==state.hover || state.hoverForecast){ state.hover=nearest; state.hoverForecast=false; render(); }
    });
    svg.addEventListener('mouseleave',function(){
      if(state.hover!==null || state.hoverForecast){ state.hover=null; state.hoverForecast=false; render(); }
    });
  }

  /* ---------- event delegation ---------- */
  root.addEventListener('click',function(e){
    var t=e.target.closest('[data-action]');
    if(!t) return;
    var action=t.getAttribute('data-action');
    if(action==='toggle-theme'){ state.dark=!state.dark; render(); }
    else if(action==='toggle-legend'){ var z=t.getAttribute('data-zone'); state.hidden[z]=!state.hidden[z]; render(); }
    else if(action==='select-zone'){ var z2=t.getAttribute('data-zone'); state.selected=(state.selected===z2?null:z2); render(); }
    else if(action==='clear-selection'){ state.selected=null; render(); }
    else if(action==='set-gran'){ state.gran=t.getAttribute('data-value'); state.hover=null; render(); }
    else if(action==='rango'){
      var rb=realBounds();
      if(rb){
        var earliestKey=keyOfMonth(rb.trueMinMs), lastRealKey=keyOfMonth(rb.trueMaxMs), horizonKey=keyOfMonth(rb.horizonEndMs);
        var kind=t.getAttribute('data-kind');
        if(kind==='6m'){ state.fromVal=maxKey(earliestKey, shiftMonth(lastRealKey,-6)); state.toVal=horizonKey; }
        else if(kind==='12m'){ state.fromVal=maxKey(earliestKey, shiftMonth(lastRealKey,-12)); state.toVal=horizonKey; }
        else if(kind==='todo'){ state.fromVal=earliestKey; state.toVal=horizonKey; }
        else if(kind==='pronostico'){ state.fromVal=lastRealKey; state.toVal=horizonKey; }
      }
      state.hover=null; render();
    }
  });

  root.addEventListener('change',function(e){
    if(e.target.matches('select[data-role="from"]')){ state.fromVal=e.target.value; state.hover=null; render(); }
    else if(e.target.matches('select[data-role="to"]')){ state.toVal=e.target.value; state.hover=null; render(); }
  });

  root.addEventListener('mouseover',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin){ var id=pin.getAttribute('data-pin'); if(state.hoverPin!==id){ state.hoverPin=id; render(); } }
  });
  root.addEventListener('mouseout',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin && !(e.relatedTarget && pin.contains(e.relatedTarget))){ if(state.hoverPin){ state.hoverPin=null; render(); } }
  });
  root.addEventListener('click',function(e){
    var pin=e.target.closest('[data-pin]');
    if(pin){ var id=pin.getAttribute('data-pin'); state.selected=(state.selected===id?null:id); render(); }
  });

  render();

  fetch('./data/data.json?v='+Date.now(), {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ state.data=data; render(); })
    .catch(function(err){ state.loadError=err; render(); });
})();
</script>
</body>
</html>
